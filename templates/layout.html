<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — School Manager</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="sidebar-logo">
            <div class="icon-wrap"><i class="ti ti-school"></i></div>
            <div class="school-name">School Manager</div>
            <div class="app-label">Admin Portal</div>
        </div>

        <nav class="nav">
            <a href="/dashboard" class="nav-item {{if eq .Page "dashboard"}}active{{end}}">
                <i class="ti ti-layout-dashboard"></i> Dashboard
            </a>
            <a href="/students" class="nav-item {{if eq .Page "students"}}active{{end}}">
                <i class="ti ti-users"></i> Students
            </a>
            <a href="/classes" class="nav-item {{if eq .Page "classes"}}active{{end}}">
                <i class="ti ti-building"></i> Classes
            </a>
            <a href="/subjects" class="nav-item {{if eq .Page "subjects"}}active{{end}}">
                <i class="ti ti-book"></i> Subjects
            </a>
            <a href="/teachers" class="nav-item {{if eq .Page "teachers"}}active{{end}}">
                <i class="ti ti-user-check"></i> Teachers
            </a>
            <a href="/results" class="nav-item {{if eq .Page "results"}}active{{end}}">
                <i class="ti ti-chart-bar"></i> Results
            </a>
            <a href="/reportcards" class="nav-item {{if eq .Page "reportcards"}}active{{end}}">
                <i class="ti ti-file-text"></i> Report cards
            </a>
            <a href="/terms" class="nav-item {{if eq .Page "terms"}}active{{end}}">
                <i class="ti ti-calendar"></i> Terms
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-row">
                <div class="user-avatar">{{.UserInitials}}</div>
                <div class="user-info">
                    <div class="name">{{.UserName}}</div>
                    <div class="role-tag">{{.Role}}</div>
                </div>
            </div>
            <a href="/logout" class="logout-link">
                <i class="ti ti-logout"></i> Sign out
            </a>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <div class="topbar-title">{{.Title}}</div>
            <div class="topbar-right">
                <span class="term-badge">{{.Term}}</span>
            </div>
        </div>

        <div class="content">
            {{template "content" .}}
        </div>
    </div>
</div>
</body>
</html>
