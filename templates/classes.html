{{define "content"}}
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <div>
        <div style="font-size:13px; color:#888; margin-bottom:2px;">Manage your school classes</div>
    </div>
    <button onclick="document.getElementById('add-modal').style.display='flex'"
        style="background:#1A6FBF; color:#fff; border:none; padding:10px 18px; border-radius:8px; font-size:13.5px; font-weight:500; cursor:pointer;">
        + Add class
    </button>
</div>

{{if .Classes}}
<div style="background:#fff; border-radius:12px; border:0.5px solid #D8E8F8; overflow:hidden;">
    <table style="width:100%; border-collapse:collapse;">
        <thead>
            <tr style="border-bottom:0.5px solid #EBF2FA;">
                <th style="text-align:left; padding:14px 20px; font-size:12px; color:#888; font-weight:500;">Class name</th>
                <th style="text-align:left; padding:14px 20px; font-size:12px; color:#888; font-weight:500;">Form teacher</th>
                <th style="text-align:left; padding:14px 20px; font-size:12px; color:#888; font-weight:500;">Students</th>
            </tr>
        </thead>
        <tbody>
            {{range .Classes}}
            <tr style="border-bottom:0.5px solid #F2F7FC;">
                <td style="padding:14px 20px; font-size:13.5px; font-weight:500; color:#1a1a1a;">{{.Name}}</td>
                <td style="padding:14px 20px; font-size:13.5px; color:#888;">Not assigned</td>
                <td style="padding:14px 20px;">
                    <span style="font-size:12px; background:#E3F0FB; color:#1A6FBF; padding:3px 10px; border-radius:20px; font-weight:500;">0 students</span>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
{{else}}
<div style="background:#fff; border-radius:12px; border:0.5px solid #D8E8F8; padding:48px; text-align:center;">
    <div style="font-size:32px; margin-bottom:12px;">🏫</div>
    <div style="font-size:15px; font-weight:500; color:#1a1a1a; margin-bottom:6px;">No classes yet</div>
    <div style="font-size:13px; color:#888;">Add your first class to get started</div>
</div>
{{end}}

<!-- Add class modal -->
<div id="add-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:16px; padding:32px; width:100%; max-width:420px;">
        <div style="font-size:16px; font-weight:500; color:#1a1a1a; margin-bottom:6px;">Add a class</div>
        <div style="font-size:13px; color:#888; margin-bottom:24px;">Enter the class name e.g. JSS 1A, SS 2B</div>

        <form action="/classes/add" method="POST">
            <div style="margin-bottom:16px;">
                <label style="display:block; font-size:13px; font-weight:500; color:#444; margin-bottom:6px;">Class name</label>
                <input name="name" type="text" placeholder="e.g. JSS 1A"
                    style="width:100%; padding:10px 14px; border:0.5px solid #C5D8EE; border-radius:8px; font-size:14px; outline:none;" required />
            </div>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button type="button" onclick="document.getElementById('add-modal').style.display='none'"
                    style="padding:10px 18px; border:0.5px solid #C5D8EE; border-radius:8px; background:#fff; font-size:13.5px; cursor:pointer; color:#444;">
                    Cancel
                </button>
                <button type="submit"
                    style="padding:10px 18px; background:#1A6FBF; color:#fff; border:none; border-radius:8px; font-size:13.5px; font-weight:500; cursor:pointer;">
                    Add class
                </button>
            </div>
        </form>
    </div>
</div>
{{end}}
