<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — School Manager</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <i class="ti ti-school"></i>
        </div>
        <div class="login-title">School Manager</div>
        <div class="login-subtitle">Sign in to your account</div>

        {{if .Error}}
        <div class="error-msg">Invalid email or password. Try again.</div>
        {{end}}

        <form action="/login" method="POST">
            <div class="form-group">
                <label class="form-label">Email address</label>
                <input class="form-input" type="email" name="email" placeholder="admin@school.com" required />
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-input" type="password" name="password" placeholder="••••••••" required />
            </div>
            <button class="login-btn" type="submit">Sign in</button>
        </form>
    </div>
</div>
</body>
</html>
